services:
  postgres:
    image: postgres:16-alpine
    container_name: bienestapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bienestapp
      POSTGRES_PASSWORD: bienestapp_dev
      POSTGRES_DB: bienestapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bienestapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bienestapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: bienestapp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: bienestapp
      MINIO_ROOT_PASSWORD: bienestapp_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
